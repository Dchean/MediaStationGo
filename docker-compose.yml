# MediaStationGo default Docker Compose install file.
#
# Quick start:
#   1. docker compose pull
#   2. docker compose up -d
#   3. Open http://<host-ip>:18080
#
# Default account:
#   admin / admin123
#
# Local persistent folders created next to this file:
#   ./data   SQLite database, JWT secret, runtime configuration
#   ./cache  posters, scraped artwork, transcode cache
#   ./media  optional local media mount; replace with your NAS path if needed

services:
  mediastation-go:
    image: ghcr.io/shukebta/mediastation-go:${MEDIASTATION_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: mediastation-go
    restart: unless-stopped

    ports:
      - "${MEDIASTATION_HTTP_PORT:-18080}:8080"

    volumes:
      - ${MEDIASTATION_DATA_DIR:-./data}:/data
      - ${MEDIASTATION_CACHE_DIR:-./cache}:/cache
      - ${MEDIASTATION_MEDIA_DIR:-./media}:/media:ro

    environment:
      MEDIASTATION_APP_HOST: 0.0.0.0
      MEDIASTATION_APP_PORT: 8080
      MEDIASTATION_APP_DATA_DIR: /data
      MEDIASTATION_APP_WEB_DIR: /app/web/dist
      MEDIASTATION_DATABASE_DB_PATH: /data/mediastation.db
      MEDIASTATION_CACHE_CACHE_DIR: /cache
      MEDIASTATION_LOGGING_LEVEL: ${MEDIASTATION_LOGGING_LEVEL:-info}
      MEDIASTATION_TRANSCODER_ENCODER: ${MEDIASTATION_TRANSCODER_ENCODER:-}
      MEDIASTATION_TRANSCODER_MAX_HEIGHT: ${MEDIASTATION_TRANSCODER_MAX_HEIGHT:-1080}
      MEDIASTATION_APP_CORS_ORIGINS: ${MEDIASTATION_APP_CORS_ORIGINS:-}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Asia/Shanghai}

    # Optional Intel QSV / VAAPI hardware acceleration.
    # Uncomment on Linux/NAS hosts with /dev/dri available, then set:
    #   MEDIASTATION_TRANSCODER_ENCODER=vaapi
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - "${RENDER_GID:-989}"

    # Optional NVIDIA NVENC hardware acceleration.
    # Install NVIDIA Container Toolkit on the host, then set:
    #   MEDIASTATION_TRANSCODER_ENCODER=nvenc
    # gpus: all

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
